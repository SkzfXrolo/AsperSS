databases:
  - name: aspers-db
    databaseName: aspers
    user: aspers

services:
  - type: web
    name: aspers-app
    runtime: python
    rootDir: web_app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn_config.py app:app
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aspers-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
